name: CI / Deploy

# ── Triggers ──────────────────────────────────────────────────────────────────
# dev  → build only (CI check, test locally before merging)
# main → build + deploy to production (frontend → S3, backend → CodeDeploy)
# PRs  → build only, no deploy
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# One deployment at a time; new push cancels in-progress
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend (production)
        if: github.ref == 'refs/heads/main'
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}

      - name: Build frontend (CI check — dev branch / PRs)
        if: github.ref != 'refs/heads/main'
        run: npm run build
        working-directory: frontend

      - name: Upload frontend artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Job 2: Deploy Frontend → S3 + CloudFront (main only) ─────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_PROD }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_PROD }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID_PROD }} \
            --paths "/*"

  # ── Job 3: Deploy Backend → CodeDeploy blue/green (main only) ────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Package deployment bundle
        run: |
          zip -r deployment.zip appspec.yml scripts/ backend/

      - name: Upload bundle to S3
        run: |
          aws s3 cp deployment.zip \
            s3://${{ secrets.S3_DEPLOY_BUCKET }}/deployment-${{ github.sha }}.zip

      - name: Create CodeDeploy deployment
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name pmapp \
            --deployment-group-name pmapp-prod \
            --s3-location bucket=${{ secrets.S3_DEPLOY_BUCKET }},key=deployment-${{ github.sha }}.zip,bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --query 'deploymentId' --output text)
          echo "Deployment ID: $DEPLOYMENT_ID"
          aws deploy wait deployment-successful --deployment-id $DEPLOYMENT_ID
          echo "✅ CodeDeploy deployment successful"
