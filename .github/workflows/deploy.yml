name: CI / Deploy

# ── Triggers ──────────────────────────────────────────────────────────────────
# dev  → staging environment
# main → production environment
# PRs targeting either branch → build only (no deploy)
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# One deployment per branch at a time; new push cancels in-progress
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & Build ─────────────────────────────────────────────────────
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          # main → PROD API URL, dev → STAGING API URL
          VITE_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.VITE_API_URL_PROD || secrets.VITE_API_URL_STAGING }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.ref_name }}
          path: frontend/dist/
          retention-days: 1

  # ── Job 2: Deploy Frontend → S3 + CloudFront ────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (${{ github.ref == 'refs/heads/main' && 'PROD' || 'STAGING' }})
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.ref_name }}
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Sync to S3
        run: |
          BUCKET=${{ github.ref == 'refs/heads/main' && secrets.S3_BUCKET_PROD || secrets.S3_BUCKET_STAGING }}
          aws s3 sync dist/ s3://$BUCKET/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must not be cached (SPA routing)
          aws s3 cp dist/index.html s3://$BUCKET/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=${{ github.ref == 'refs/heads/main' && secrets.CF_DISTRIBUTION_ID_PROD || secrets.CF_DISTRIBUTION_ID_STAGING }}
          aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/*"

  # ── Job 3: Deploy Backend → EC2 via SSH ─────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (${{ github.ref == 'refs/heads/main' && 'PROD' || 'STAGING' }})
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ github.ref == 'refs/heads/main' && secrets.EC2_HOST_PROD || secrets.EC2_HOST_STAGING }}
          username: ec2-user
          key:      ${{ github.ref == 'refs/heads/main' && secrets.EC2_SSH_KEY_PROD || secrets.EC2_SSH_KEY_STAGING }}
          timeout:  120s
          script: |
            set -e
            cd /opt/pmapp

            echo "▶ Pulling latest code (${{ github.ref_name }})..."
            git pull origin ${{ github.ref_name }}

            echo "▶ Rebuilding and restarting backend..."
            docker compose -f docker-compose.prod.yml up -d --build backend

            echo "▶ Waiting for health check..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
              if [ "$STATUS" = "200" ]; then
                echo "✅ Backend healthy (attempt $i)"
                exit 0
              fi
              echo "  Attempt $i: status=$STATUS, retrying..."
              sleep 5
            done
            echo "❌ Backend health check failed after 60s"
            docker compose -f docker-compose.prod.yml logs --tail=50 backend
            exit 1
