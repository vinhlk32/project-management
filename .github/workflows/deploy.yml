name: CI / Deploy

# ── Triggers ──────────────────────────────────────────────────────────────────
# dev  → staging environment
# main → production environment
# PRs targeting either branch → build only (no deploy)
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# One deployment per branch at a time; new push cancels in-progress
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & Build ─────────────────────────────────────────────────────
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend (staging)
        if: github.ref == 'refs/heads/dev'
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_STAGING }}

      - name: Build frontend (production)
        if: github.ref == 'refs/heads/main'
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}

      - name: Build frontend (PR — no env, local proxy)
        if: github.event_name == 'pull_request'
        run: npm run build
        working-directory: frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.ref_name }}
          path: frontend/dist/
          retention-days: 1

  # ── Job 2a: Deploy Frontend → STAGING (dev branch) ──────────────────────────
  deploy-frontend-staging:
    name: Deploy Frontend (STAGING)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-dev
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Sync to S3 (staging)
        env:
          BUCKET: ${{ secrets.S3_BUCKET_STAGING }}
        run: |
          aws s3 sync dist/ s3://$BUCKET/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://$BUCKET/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront (staging)
        env:
          DIST_ID: ${{ secrets.CF_DISTRIBUTION_ID_STAGING }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/*"

  # ── Job 2b: Deploy Frontend → PRODUCTION (main branch) ──────────────────────
  deploy-frontend-prod:
    name: Deploy Frontend (PRODUCTION)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-main
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Sync to S3 (production)
        env:
          BUCKET: ${{ secrets.S3_BUCKET_PROD }}
        run: |
          aws s3 sync dist/ s3://$BUCKET/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://$BUCKET/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront (production)
        env:
          DIST_ID: ${{ secrets.CF_DISTRIBUTION_ID_PROD }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/*"

  # ── Job 3a: Deploy Backend → STAGING EC2 — zero-downtime blue/green ─────────
  deploy-backend-staging:
    name: Deploy Backend (STAGING)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: staging

    steps:
      - name: Zero-downtime deploy to staging EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST_STAGING }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY_STAGING }}
          timeout:  180s
          script: |
            set -e
            cd /opt/pmapp

            # ── Determine current (blue) and next (green) ports ──────────────
            BLUE_PORT=$(docker inspect --format='{{(index (index .NetworkSettings.Ports "3001/tcp") 0).HostPort}}' pmapp-backend-blue 2>/dev/null || echo "")
            if [ "$BLUE_PORT" = "3001" ]; then
              CURRENT=blue; CURRENT_PORT=3001
              NEXT=green;   NEXT_PORT=3002
            else
              CURRENT=green; CURRENT_PORT=3002
              NEXT=blue;     NEXT_PORT=3001
            fi
            echo "▶ Current slot: $CURRENT (:$CURRENT_PORT) → deploying to: $NEXT (:$NEXT_PORT)"

            # ── Pull latest code ─────────────────────────────────────────────
            git pull origin dev

            # ── Build new image ──────────────────────────────────────────────
            docker build -t pmapp-backend:new ./backend

            # ── Start next container on standby port ─────────────────────────
            docker rm -f pmapp-backend-$NEXT 2>/dev/null || true
            docker run -d \
              --name pmapp-backend-$NEXT \
              --network pmapp-network \
              --env-file .env.production \
              -e DB_HOST=pmapp-db \
              -e PORT=3001 \
              -p 127.0.0.1:$NEXT_PORT:3001 \
              --restart unless-stopped \
              pmapp-backend:new

            # ── Health check new container ───────────────────────────────────
            echo "▶ Health checking new container on :$NEXT_PORT..."
            for i in $(seq 1 18); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$NEXT_PORT/api/health)
              if [ "$STATUS" = "200" ]; then
                echo "✅ New container healthy (attempt $i)"
                break
              fi
              if [ "$i" = "18" ]; then
                echo "❌ New container failed health check — rolling back"
                docker rm -f pmapp-backend-$NEXT
                exit 1
              fi
              echo "  Attempt $i: status=$STATUS, retrying..."
              sleep 5
            done

            # ── Swap Nginx upstream — zero-downtime reload ───────────────────
            echo "▶ Swapping Nginx upstream to :$NEXT_PORT..."
            sudo sed -i "s|server 127.0.0.1:[0-9]*;|server 127.0.0.1:$NEXT_PORT;|" \
              /etc/nginx/conf.d/pmapp.conf
            sudo nginx -t
            sudo nginx -s reload
            echo "✅ Nginx reloaded — traffic now on :$NEXT_PORT"

            # ── Stop old container ───────────────────────────────────────────
            docker rm -f pmapp-backend-$CURRENT 2>/dev/null || true
            docker image tag pmapp-backend:new pmapp-backend:current
            echo "✅ Staging deploy complete — slot: $NEXT"

  # ── Job 3b: Deploy Backend → PRODUCTION EC2 — zero-downtime blue/green ──────
  deploy-backend-prod:
    name: Deploy Backend (PRODUCTION)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Zero-downtime deploy to production EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST_PROD }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY_PROD }}
          timeout:  180s
          script: |
            set -e
            cd /opt/pmapp

            # ── Determine current (blue) and next (green) ports ──────────────
            BLUE_PORT=$(docker inspect --format='{{(index (index .NetworkSettings.Ports "3001/tcp") 0).HostPort}}' pmapp-backend-blue 2>/dev/null || echo "")
            if [ "$BLUE_PORT" = "3001" ]; then
              CURRENT=blue; CURRENT_PORT=3001
              NEXT=green;   NEXT_PORT=3002
            else
              CURRENT=green; CURRENT_PORT=3002
              NEXT=blue;     NEXT_PORT=3001
            fi
            echo "▶ Current slot: $CURRENT (:$CURRENT_PORT) → deploying to: $NEXT (:$NEXT_PORT)"

            # ── Pull latest code ─────────────────────────────────────────────
            git pull origin main

            # ── Build new image ──────────────────────────────────────────────
            docker build -t pmapp-backend:new ./backend

            # ── Start next container on standby port ─────────────────────────
            docker rm -f pmapp-backend-$NEXT 2>/dev/null || true
            docker run -d \
              --name pmapp-backend-$NEXT \
              --network pmapp-network \
              --env-file .env.production \
              -e DB_HOST=pmapp-db \
              -e PORT=3001 \
              -p 127.0.0.1:$NEXT_PORT:3001 \
              --restart unless-stopped \
              pmapp-backend:new

            # ── Health check new container ───────────────────────────────────
            echo "▶ Health checking new container on :$NEXT_PORT..."
            for i in $(seq 1 18); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$NEXT_PORT/api/health)
              if [ "$STATUS" = "200" ]; then
                echo "✅ New container healthy (attempt $i)"
                break
              fi
              if [ "$i" = "18" ]; then
                echo "❌ New container failed health check — rolling back"
                docker rm -f pmapp-backend-$NEXT
                exit 1
              fi
              echo "  Attempt $i: status=$STATUS, retrying..."
              sleep 5
            done

            # ── Swap Nginx upstream — zero-downtime reload ───────────────────
            echo "▶ Swapping Nginx upstream to :$NEXT_PORT..."
            sudo sed -i "s|server 127.0.0.1:[0-9]*;|server 127.0.0.1:$NEXT_PORT;|" \
              /etc/nginx/conf.d/pmapp.conf
            sudo nginx -t
            sudo nginx -s reload
            echo "✅ Nginx reloaded — traffic now on :$NEXT_PORT"

            # ── Stop old container ───────────────────────────────────────────
            docker rm -f pmapp-backend-$CURRENT 2>/dev/null || true
            docker image tag pmapp-backend:new pmapp-backend:current
            echo "✅ Production deploy complete — slot: $NEXT"
