name: CI / Deploy

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# Only one deployment runs at a time; new push cancels in-progress
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & Build ───────────────────────────────────────────────────
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Job 2: Deploy frontend → S3 + CloudFront ─────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on push to dev, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must not be cached (SPA routing)
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_FRONTEND_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Job 3: Deploy backend → EC2 via SSH ──────────────────────────────────
  deploy-backend:
    name: Deploy Backend (EC2)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ec2-user
          key:         ${{ secrets.EC2_SSH_KEY }}
          timeout:     120s
          script: |
            set -e
            cd /opt/pmapp

            echo "▶ Pulling latest code..."
            git pull origin dev

            echo "▶ Rebuilding and restarting backend..."
            docker compose -f docker-compose.prod.yml up -d --build backend

            echo "▶ Waiting for health check..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
              if [ "$STATUS" = "200" ]; then
                echo "✅ Backend healthy (attempt $i)"
                exit 0
              fi
              echo "  Attempt $i: status=$STATUS, retrying..."
              sleep 5
            done
            echo "❌ Backend health check failed after 60s"
            docker compose -f docker-compose.prod.yml logs --tail=50 backend
            exit 1
