version: 0.0
os: linux
files:
  - source: /
    destination: /opt/pmapp/codedeploy
    overwrite: yes
hooks:
  ApplicationStop:
    - location: scripts/stop_old.sh
      timeout: 60
      runas: ec2-user
  AfterInstall:
    - location: scripts/build_image.sh
      timeout: 300
      runas: ec2-user
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 120
      runas: ec2-user
  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: ec2-user
